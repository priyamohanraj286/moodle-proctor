<!DOCTYPE html>
<html>

<head>
  <title>Exam</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="exam-container">
    <div class="top-bar">
      <div>
        <div id="examTitle">Exam in Progress</div>
        <div class="exam-meta">
          <span id="examStudentName">Loading...</span>
          <span id="examStudentEmail">Loading...</span>
        </div>
      </div>
      <div class="exam-top-right">
        <div>Timer: <span id="timer">00:00</span></div>
        <div>Warnings: <span id="violationCount">0</span></div>
      </div>
    </div>

    <p id="examMessage" class="status-message" hidden></p>

    <div class="exam-actions">
      <button class="primary-btn" id="submitExamButton" onclick="submitExam('manual_submit')">Submit Exam</button>
      <button class="secondary-btn" onclick="goBackToDashboard()">Back to Dashboard</button>
    </div>

    <div style="width: 100%; display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 16px; align-items: start;">
      <div>
        <h2>Question Paper</h2>
        <iframe id="questionFrame" width="100%" height="500px"></iframe>
      </div>

      <aside style="background: #ffffff; border: 1px solid #d0d5dd; border-radius: 12px; padding: 16px;">
        <h2 style="margin-top: 0;">Warning History</h2>
        <p style="margin-top: 0; color: #475467; font-size: 14px;">
          The latest 5 warnings recorded for this attempt are shown below.
        </p>
        <ul id="warningHistoryList" style="list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 12px;">
          <li style="color: #475467; font-size: 14px;">No warnings recorded yet.</li>
        </ul>
      </aside>
    </div>

    <div class="video-box">
      <video id="video" autoplay playsinline muted></video>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/exam.js"></script>
</body>
</html>
